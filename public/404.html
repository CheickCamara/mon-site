<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page introuvable — Pop Fluence</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a0533, #2d0a4e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 480px; }
    .num {
      font-size: 120px;
      font-weight: 900;
      letter-spacing: -4px;
      line-height: 1;
      background: linear-gradient(135deg, #c084fc, #ff6b9d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }
    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 12px; }
    p { color: rgba(255,255,255,0.65); font-size: 1rem; line-height: 1.6; margin-bottom: 32px; }
    a {
      display: inline-block;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: #fff;
      padding: 14px 32px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      box-shadow: 0 4px 20px rgba(124,58,237,0.4);
    }
    a:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="num">404</div>
    <h1>Page introuvable</h1>
    <p>La page que tu cherches n'existe pas ou a été déplacée.</p>
    <a href="/">← Retour à l'accueil</a>
  </div>
</body>
</html>
